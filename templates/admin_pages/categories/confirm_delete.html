{% extends 'admin_pages/admin_base.html' %}

{% block admin_main %}
<div class="pt-3 pb-2 mb-3 border-bottom">
  <h1 class="h2 fw-bold text-danger"><i class="bi bi-exclamation-triangle-fill me-2"></i>カテゴリの削除確認</h1>
</div>

<div class="row justify-content-center my-5">
  <div class="col-md-6 text-center">
    <div class="card shadow-sm border-0 p-5 bg-white">
      <i class="bi bi-trash text-danger display-1 mb-4"></i>
      <h3 class="fw-bold text-dark mb-3">本当に「{{ object.name }}」を削除しますか？</h3>
      <p class="text-muted mb-4">
        このカテゴリを削除すると、このカテゴリに紐づいている店舗のカテゴリ設定が未設定（空白）になります。<br>
        この操作は取り消せません。
      </p>
      
      <form method="POST">
        {% csrf_token %}
        <div class="d-flex justify-content-center gap-3">
          <a href="{% url 'admin_category_list' %}" class="btn btn-light fw-bold px-4 border">キャンセル</a>
          <button type="submit" class="btn btn-danger fw-bold px-4">本当に削除する</button>
        </div>
      </form>
    </div>
  </div>
</div>
{% endblock %}
