{% extends 'base.html' %}

{% block main %}
<div class="container my-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      
      <nav aria-label="breadcrumb" class="mb-4">
        <ol class="breadcrumb">
          <li class="breadcrumb-item"><a href="{% url 'store_detail' store.pk %}" class="text-decoration-none">{{ store.name }}</a></li>
          <li class="breadcrumb-item active" aria-current="page">レビューを投稿</li>
        </nav>
      </nav>

      <div class="card shadow-sm border-0">
        <div class="card-body p-4">
          <h2 class="fw-bold text-dark mb-2">レビューを投稿する</h2>
          <p class="text-muted small mb-4">対象店舗: <strong class="text-dark">{{ store.name }}</strong></p>

          <form method="POST">
            {% csrf_token %}

            <div class="mb-3">
  <label for="id_rating" class="form-label fw-bold text-secondary">評価（5段階）</label>
  <select name="rating" id="id_rating" class="form-select form-select-lg" required>
    <option value="" selected disabled>評価を選択してください</option>
    <option value="5">★★★★★ (5) - 最高</option>
    <option value="4">★★★★☆ (4) - 満足</option>
    <option value="3">★★★☆☆ (3) - 普通</option>
    <option value="2">★★☆☆☆ (2) - 微妙</option>
    <option value="1">★☆☆☆☆ (1) - 不満</option>
  </select>
</div>

            <div class="mb-4">
              <label for="id_comment" class="form-label fw-bold text-secondary">コメント</label>
              <textarea name="comment" id="id_comment" class="form-control form-control-lg" rows="5" placeholder="お店の雰囲気や料理の感想を教えてください" required></textarea>
            </div>

            <div class="d-grid gap-2">
              <button type="submit" class="btn btn-primary btn-lg fw-bold shadow-sm">
                <i class="bi bi-cloud-arrow-up-fill me-2"></i>レビューを送信する
              </button>
              <a href="{% url 'store_detail' store.pk %}" class="btn btn-outline-secondary">
                キャンセル
              </a>
            </div>
          </form>

        </div>
      </div>

    </div>
  </div>
</div>
{% endblock %}
