{% extends 'admin_pages/admin_base.html' %}

{% block admin_main %}
<div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
  <h1 class="h2 fw-bold text-dark">📊 売上・分析ダッシュボード</h1>
</div>

<!-- サマリーカード -->
<div class="row g-4 mb-4">
  <div class="col-md-4">
    <div class="card shadow-sm border-0 bg-primary text-white p-3">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h6 class="text-white-50 small mb-1">今月の売上（サブスク）</h6>
          <h3 class="fw-bold mb-0">¥{{ sales_this_month }}</h3>
        </div>
        <i class="bi bi-currency-yen fs-1 text-white-50"></i>
      </div>
    </div>
  </div>
  <div class="col-md-4">
    <div class="card shadow-sm border-0 bg-success text-white p-3">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h6 class="text-white-50 small mb-1">有料会員数</h6>
          <h3 class="fw-bold mb-0">{{ total_premium_members }} 名</h3>
        </div>
        <i class="bi bi-people fs-1 text-white-50"></i>
      </div>
    </div>
  </div>
</div>

<!-- 期間別売上グラフ -->
<div class="card shadow-sm border-0 mb-4">
  <div class="card-header bg-white border-bottom d-flex align-items-center justify-content-between py-3">
    <h5 class="mb-0 fw-bold">📈 期間別売上・会員数推移（過去12ヶ月）</h5>
    <div class="btn-group btn-group-sm" role="group">
      <button type="button" class="btn btn-primary active" id="btn-sales" onclick="switchChart('sales')">
        売上（円）
      </button>
      <button type="button" class="btn btn-outline-primary" id="btn-members" onclick="switchChart('members')">
        会員数（名）
      </button>
    </div>
  </div>
  <div class="card-body p-4">
    <canvas id="salesChart" style="max-height:350px;"></canvas>
  </div>
</div>

<!-- グラフデータをDjangoからJSへ安全に渡す -->
<script id="chart-data" type="application/json">
{
  "labels":  {{ chart_labels_json | safe }},
  "sales":   {{ chart_sales_json | safe }},
  "members": {{ chart_members_json | safe }}
}
</script>

<script>
  document.addEventListener('DOMContentLoaded', function () {
    // JSONタグからデータを取得（XSS安全）
    var raw    = document.getElementById('chart-data').textContent;
    var data   = JSON.parse(raw);
    var labels  = data.labels;
    var salesData   = data.sales;
    var membersData = data.members;

    var ctx = document.getElementById('salesChart').getContext('2d');

    // グラデーション
    var gradientSales = ctx.createLinearGradient(0, 0, 0, 350);
    gradientSales.addColorStop(0, 'rgba(13, 110, 253, 0.35)');
    gradientSales.addColorStop(1, 'rgba(13, 110, 253, 0.02)');

    var gradientMembers = ctx.createLinearGradient(0, 0, 0, 350);
    gradientMembers.addColorStop(0, 'rgba(25, 135, 84, 0.35)');
    gradientMembers.addColorStop(1, 'rgba(25, 135, 84, 0.02)');

    var currentMode = 'sales';

    var chart = new Chart(ctx, {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: '売上（円）',
          data: salesData,
          borderColor: 'rgba(13, 110, 253, 1)',
          backgroundColor: gradientSales,
          borderWidth: 2.5,
          pointBackgroundColor: 'rgba(13, 110, 253, 1)',
          pointRadius: 5,
          pointHoverRadius: 7,
          tension: 0.4,
          fill: true,
        }]
      },
      options: {
        responsive: true,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: function (context) {
                var val = context.parsed.y;
                if (currentMode === 'sales') {
                  return '  売上: ¥' + val.toLocaleString();
                } else {
                  return '  会員数: ' + val + ' 名';
                }
              }
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: { font: { size: 12 } }
          },
          y: {
            beginAtZero: true,
            grid: { color: 'rgba(0,0,0,0.05)' },
            ticks: {
              font: { size: 12 },
              callback: function (value) {
                if (currentMode === 'sales') {
                  return '¥' + value.toLocaleString();
                } else {
                  return value + ' 名';
                }
              }
            }
          }
        }
      }
    });

    // グラフ切替
    window.switchChart = function (mode) {
      currentMode = mode;
      if (mode === 'sales') {
        chart.data.datasets[0].label = '売上（円）';
        chart.data.datasets[0].data = salesData;
        chart.data.datasets[0].borderColor = 'rgba(13, 110, 253, 1)';
        chart.data.datasets[0].backgroundColor = gradientSales;
        chart.data.datasets[0].pointBackgroundColor = 'rgba(13, 110, 253, 1)';
        document.getElementById('btn-sales').classList.add('btn-primary', 'active');
        document.getElementById('btn-sales').classList.remove('btn-outline-primary');
        document.getElementById('btn-members').classList.add('btn-outline-primary');
        document.getElementById('btn-members').classList.remove('btn-primary', 'active');
      } else {
        chart.data.datasets[0].label = '会員数（名）';
        chart.data.datasets[0].data = membersData;
        chart.data.datasets[0].borderColor = 'rgba(25, 135, 84, 1)';
        chart.data.datasets[0].backgroundColor = gradientMembers;
        chart.data.datasets[0].pointBackgroundColor = 'rgba(25, 135, 84, 1)';
        document.getElementById('btn-members').classList.add('btn-primary', 'active');
        document.getElementById('btn-members').classList.remove('btn-outline-primary');
        document.getElementById('btn-sales').classList.add('btn-outline-primary');
        document.getElementById('btn-sales').classList.remove('btn-primary', 'active');
      }
      chart.update();
    };
  });
</script>
{% endblock %}
